##############################################################
# dbt/dbt_project.yml
# Main dbt configuration file
##############################################################

name: "f1_pipeline"
version: "1.0.0"
config-version: 2

profile: "f1_pipeline"

model-paths:    ["models"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]
target-path:    "target"
clean-targets:  ["target", "dbt_packages"]

models:
  f1_pipeline:

    staging:

      +materialized: view
      +schema: staging       

    marts:

      +materialized: table
      +schema: marts         
